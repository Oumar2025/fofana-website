<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FOFANA Confiserie</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="admin-container">
            <div class="admin-header">
                <h1>🍫 Dashboard Administrateur</h1>
                <p>FOFANA CONFISERIE - Gestion des formulaires</p>
                <button onclick="logout()" class="btn-secondary">Déconnexion</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <h3>Total Soumissions</h3>
                    <p id="totalSubmissions">0</p>
                </div>
            </div>

            <div id="submissionsList">
                <h2>Soumissions reçues</h2>
                <div id="submissionsContainer">
                    <p>Aucune soumission pour le moment.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>

</html>
