<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOFANA Confiserie - Administration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="login-box">
            <div class="logo-container">
                <h1>🍫 FOFANA CONFISERIE</h1>
                <p class="subtitle">Système d'Administration</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
                </div>

                <button type="submit" class="btn-primary">Se Connecter</button>
            </form>

            <div id="loginError" class="error-message" style="display: none;">
                Nom d'utilisateur ou mot de passe incorrect
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Simple authentication
            if (username === 'admin' && password === 'fofana2026') {
                window.location.href = 'form.html?admin=true';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>

</html>
